services:
  # Spring Boot App
  - type: web
    name: url-shortener
    runtime: java
    buildCommand: mvn clean install
    startCommand: java -jar target/url-shortener-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_HOST
        fromService:
          type: private_service
          name: url-shortener-db
          property: host

      - key: DB_PORT
        fromService:
          type: private_service
          name: url-shortener-db
          property: port

      - key: DB_NAME
        value: urlshortener

      - key: DB_USER
        fromService:
          type: private_service
          name: url-shortener-db
          property: user

      - key: DB_PASSWORD
        fromService:
          type: private_service
          name: url-shortener-db
          property: password

    healthCheckPath: /

  # MySQL Database
  - type: private_service
    name: url-shortener-db
    runtime: mysql
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: urlshortener
      - key: MYSQL_USER
        value: urlshortener_user
      - key: MYSQL_PASSWORD
        generateValue: true